services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: innopolis_guide
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data  # Именованный том (надёжно на Windows)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_NAME: innopolis_guide
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      GIGACHAT_AUTH_KEY: ${GIGACHAT_AUTH_KEY}
      GIGACHAT_SCOPE: ${GIGACHAT_SCOPE}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./audio_cache:/app/audio_cache

volumes:
  pg_data:  # Объявляем том
