<!DOCTYPE html>
<html>
<head>
    <title>Научный гид по Иннополису</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; margin-bottom: 20px; text-align: center; }
        
        .popular-section { margin-bottom: 25px; background: #fff8e1; padding: 15px; border-radius: 12px; border: 2px solid #ffc107; }
        .popular-title { color: #ff9800; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .popular-grid { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .popular-badge { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 20px; font-size: 13px; color: #333; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .popular-badge:hover { background: #ff9800; color: white; border-color: #ff9800; transform: scale(1.05); }
        .count { background: #ff9800; color: white; padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .popular-badge:hover .count { background: white; color: #ff9800; }

        .place-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 18px 20px; margin: 8px 0; border-radius: 12px; cursor: pointer; width: 100%; font-size: 17px; transition: transform 0.2s, box-shadow 0.2s; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .place-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .place-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .place-btn .distance { font-size: 14px; opacity: 0.9; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 8px; }

        .loading { color: #666; text-align: center; margin-top: 20px; display: none; font-size: 18px; }
        .loading.show { display: block; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .fact-card { background: linear-gradient(135deg, #e7f3ff 0%, #f0e7ff 100%); padding: 25px; border-radius: 15px; margin-top: 25px; line-height: 1.7; display: none; border-left: 5px solid #667eea; }
        .fact-card.show { display: block; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fact-card h2 { color: #333; margin-bottom: 10px; font-size: 22px; }
        .distance-badge { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
        .fact-text { color: #444; font-size: 16px; margin-top: 10px; }
        .audio-container { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; }
        audio { width: 100%; }
        .error { background: #f8d7da; color: #721c24; border-left: 5px solid #dc3545; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .info-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 4px solid #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Научный гид по Иннополису</h1>
        <div class="subtitle">Исследуй науку в каждом уголке города</div>

        <div id="popular-section" class="popular-section" style="display: none;">
            <div class="popular-title">🔥 Популярное сейчас:</div>
            <div id="popular-list" class="popular-grid"></div>
        </div>

        <div class="info-box">💡 Нажми на достопримечательность — сразу получишь научный факт и аудио-рассказ!</div>

        <button class="place-btn" onclick="getFact(55.7517, 48.7446, 'Университет Иннополис')"><span>🏛 Университет Иннополис</span><span class="distance">~0 м</span></button>
        <button class="place-btn" onclick="getFact(55.7498, 48.7431, 'Технопарк им. А.С. Попова')"><span>🏭 Технопарк им. А.С. Попова</span><span class="distance">~210 м</span></button>
        <button class="place-btn" onclick="getFact(55.7532, 48.7459, 'Спортивный комплекс')"><span>⚽ Спортивный комплекс</span><span class="distance">~170 м</span></button>
        <button class="place-btn" onclick="getFact(55.7510, 48.7452, 'Лаборатория робототехники')"><span>🤖 Лаборатория робототехники</span><span class="distance">~80 м</span></button>
        <button class="place-btn" onclick="getFact(55.7519, 48.7521, 'ArtSpace — культурный центр')"><span>🎨 ArtSpace — культурный центр</span><span class="distance">~150 м</span></button>

        <div id="loading" class="loading">⏳ Генерирую научный факт...</div>
        <div id="fact-card" class="fact-card"></div>
    </div>

    <script>
        let placesCoords = {};

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // Загружаем координаты
                const pRes = await fetch('/api/places');
                const pData = await pRes.json();
                if (pData.places) pData.places.forEach(p => placesCoords[p.place_id] = [p.latitude, p.longitude]);

                // Загружаем популярные
                const popRes = await fetch('/api/popular');
                const popData = await popRes.json();
                
                if (popData.status === 'ok' && popData.places && popData.places.length > 0) {
                    const container = document.getElementById('popular-list');
                    container.innerHTML = '';
                    popData.places.forEach(place => {
                        const badge = document.createElement('div');
                        badge.className = 'popular-badge';
                        badge.innerHTML = `${place.name} <span class="count">${place.request_count}</span>`;
                        badge.onclick = () => {
                            const c = placesCoords[place.place_id];
                            if (c) getFact(c[0], c[1], '');
                        };
                        container.appendChild(badge);
                    });
                    document.getElementById('popular-section').style.display = 'block';
                }
            } catch (e) { console.error('Error:', e); }
        });

        async function getFact(lat, lon) {
            document.getElementById('loading').classList.add('show');
            document.getElementById('fact-card').classList.remove('show');
            document.getElementById('fact-card').innerHTML = '';
            document.querySelectorAll('.place-btn').forEach(btn => btn.disabled = true);

            try {
                const res = await fetch('/api/get_fact', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({lat, lon}) });
                const data = await res.json();
                document.getElementById('loading').classList.remove('show');

                if (data.status === 'ok') {
                    let html = `<h2>${data.place_name}</h2>`;
                    if (data.distance) html += `<div class="distance-badge">📍 ${data.distance} от вас</div>`;
                    if (data.fact) html += `<div class="fact-text">${data.fact.replace(/\n/g, '<br>')}</div>`;
                    if (data.audio_filename) html += `<div class="audio-container"><p style="margin-bottom:10px;color:#666;font-size:14px;">🔊 Слушать:</p><audio controls><source src="/audio/${data.audio_filename}" type="audio/mpeg"></audio></div>`;
                    
                    const card = document.getElementById('fact-card');
                    card.innerHTML = html;
                    card.classList.add('show');
                } else {
                    showError(data.message || 'Ошибка');
                }
            } catch(e) { showError('Ошибка сети: ' + e.message); }
            document.querySelectorAll('.place-btn').forEach(btn => btn.disabled = false);
        }

        function showError(msg) {
            const card = document.getElementById('fact-card');
            card.innerHTML = `<p>${msg}</p>`;
            card.className = 'fact-card show error';
        }
    </script>
</body>
</html>
